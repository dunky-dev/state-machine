name: Deploy benchmark demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for newer pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ci-setup

      - name: Build demo
        # The canonical demo ships with the docs site at
        # dunky.dev/state-machine/benchmark/demo (bundled into the Astro dist;
        # see website/package.json). This Pages deploy is a standalone mirror at
        # the same path, so the base must match.
        env:
          BASE_PATH: /state-machine/benchmark/demo/
        run: pnpm -C benchmark/demo build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: benchmark/demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
